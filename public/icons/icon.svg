    <line x1="32" y1="25" x2="22.5" y2="12.5" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="32" y1="25" x2="41.5" y2="12.5" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="22.5" cy="12.5" r="2.7" stroke="none"/>
    <circle cx="41.5" cy="12.5" r="2.7" stroke="none"/>
    <circle cx="32" cy="25" r="3.2" stroke="none"/>
    <!-- TV screen -->
    <rect x="13" y="27" width="38" height="25.5" rx="6" fill="#fff" fill-opacity=".12" stroke-width="2.8"/>
