<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="120" y1="70" x2="420" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f86ff"/><stop offset=".55" stop-color="#2f5fe6"/><stop offset="1" stop-color="#1a2fb0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="62%">
      <stop offset="0" stop-color="#7ea6ff" stop-opacity=".55"/><stop offset="1" stop-color="#7ea6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#glow)"/>
  <!-- motif authored in 64-space, scaled x8 -->
